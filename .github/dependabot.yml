# pip + GitHub Actions. pip bumps come in individually so semver
# impact on downstream notebooks / pipelines is reviewable; dev-only
# updates are grouped to cut noise.

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "13:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "automated"
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "13:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    labels:
      - "automated"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
